<!DOCTYPE html>
<html lang="ja">
    <head>
        <title>キャラクターシート</title>
        <link rel="icon" href="/assets/favicon.ico">
        <link rel="shortcut icon" href="/assets/favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
        <link rel="stylesheet" href="/styles/index.css">
        <link rel="stylesheet" href="/styles/chara.css">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="description" content="デモ版です。">
        <meta name="theme-color" content="#44AEF3">
        <meta property="og:title" content="キャラクターシート">
        <meta property="og:description" content="デモ版です。">
        <meta property="og:type" content="website">
        <meta property="og:locale" content="ja_JP">
        <meta property="og:url" content="https://nlxria.github.io/chara">
        <meta property="og:image" content="https://raw.githubusercontent.com/nlxria/nlxria.github.io/main/assets/favicon.png">
        <meta property="og:deteminer" content="GitHub">
        <meta property="og:site_name" content="GitHub">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:site" content="@cthulhumasters">
        <meta name="twitter:creator" content="@nlxria">
        <meta name="twitter:title" content="キャラクターシート">
        <meta name="twitter:description" content="デモ版です。">
    </head>
    <body><main id="app-main">
        <header><a class="back" onclick="history.back()">←</a><a class="title" href="/chara">キャラシ</a>
            <div>        
                <button id="edit-mode-btn" class="edit-btn" style="display: none;">編集する</button>

                <div id="auth-container" style="display: flex; align-items: center; gap: 10px;">
                    
                    <form id="logged-out-ui" style="display: flex; gap: 5px; margin: 0;">
                        <input type="email" id="email-input" placeholder="メールアドレス" class="pass-input" style="margin:0; width: 150px; padding: 0.5em;" required autocomplete="email">
                        <input type="password" id="pass-input" placeholder="パスワード" class="pass-input" style="margin:0; width: 120px; padding: 0.5em;" required autocomplete="current-password">
                        <button type="submit" id="login-btn" class="edit-btn">ログイン</button>
                        <button type="button" id="signup-btn" class="edit-btn" style="background: #44AEF3;">新規登録</button>
                    </form>
                    
                    <div id="logged-in-ui" style="display: none; align-items: center; gap: 10px; color: #304E72; font-weight: bold; font-size: 0.9em;">
                        <span id="user-email-display"></span>
                        <button id="logout-btn" class="edit-btn" style="background: #e74c3c;">ログアウト</button>
                    </div>
                    
                </div>
            </div>
        </header>
        <div class="head"></div>
        <div id="profile-container" style="display: none; padding: 2vh 4.5vh; text-align: center;">
            <div class="profile-image-wrapper">
                <img id="chara-image" src="" alt="" onerror="this.src='data:image/svg+xml;charset=UTF8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22100%22%20height=%22100%22%20style=%22background:%236C757D%22%3E%3C/svg%3E'">
                <input type="text" id="chara-image-input" class="pass-input edit-only-ui" placeholder="画像URLを入力" style="margin-top: 10px;">
            </div>
            <h1 id="chara-name" class="editable-title"></h1>
        </div>
        <div id="basic-status-container" style="padding: 0 4.5vh;"></div>
        <div id="sheets-container"></div>
        <div id="settings-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3>メモの設定</h3>
                <div style="margin-bottom: 1em;">
                    <label style="color: white; font-size: 0.9em;">閲覧パスワード（空欄でロックなし）</label>
                    <input type="text" id="modal-pass-input" class="pass-input" placeholder="パスワードを入力">
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 2em;">
                    <button id="modal-delete-btn" class="edit-btn" style="background: #e74c3c;">このメモを削除</button>
                    <div>
                        <button id="modal-cancel-btn" class="edit-btn" style="background: #6C757D;">キャンセル</button>
                        <button id="modal-save-btn" class="edit-btn" style="background: #44AEF3;">保存</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="dashboard-container" style="display: none; text-align: center; margin-top: 15vh;">
            <h2 style="color: white; font-size: 2em; margin-bottom: 1em;">キャラクター管理</h2>
            <button id="create-chara-btn" class="edit-btn" style="font-size: 1.2em; padding: 1em 2em; display: none;">＋ 新規キャラクターを作成</button>
            <p id="create-login-prompt" style="color: lightpink;">※作成するにはログインしてください</p>
        </div>
        <script type="module" src="/scripts/chara.js"></script>
    </main></body>
</html>
